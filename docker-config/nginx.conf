server {
    listen 80;
    server_name ejsc.my.id www.ejsc.my.id;

    # Redirect otomatis semua traffic HTTP ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ejsc.my.id www.ejsc.my.id;

    root /var/www/public;
    index index.php index.html;

    # Sertifikat SSL dari Certbot (Pastikan sudah dimount di compose.yml)
    ssl_certificate /etc/letsencrypt/live/ejsc.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ejsc.my.id/privkey.pem;

    # Optimasi Keamanan SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # SESUAIKAN: ganti 'app' menjadi 'ejsc-app' jika di compose.yml namanya itu
        fastcgi_pass ejsc-app:9000; 
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
