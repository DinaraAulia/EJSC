name: Continuous Deployment

on:
  push:
    paths:
      - '**.php'       # Hanya jalan kalau ada perubahan file penting
      - '**.blade.php' 
      - 'resources/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Build Assets (NPM)
        run: |
          npm install
          npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: ".,!storage,!bootstrap/cache,!node_modules,!.git,!.github, !.env"
          target: "/home/${{ secrets.SSH_USER }}/EJSC"

      - name: Refresh Docker and Cache
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/EJSC
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:clear
            echo "Deployment Success, May the force be with you!"