name: Continuous Deployment
on:
  push:
    paths:
      - '**.php'
      - '**.blade.php' 
      - 'resources/**' 
      - 'public/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP Dependencies
        run: |
          export COMPOSER_CACHE_DIR=/tmp/composer-cache
          composer install --prefer-dist --no-progress --no-suggest

      - name: Run PHP Artisan Test
        run: |
          cp .env.testing .env
          php artisan key:generate
          php artisan test tests/Feature

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Build Assets (NPM)
        run: |
          npm install
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage' \
            --exclude='bootstrap/cache' \
            --exclude='.env' \
            --exclude='.env.testing' \
            --exclude='mysql_data' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/EJSC/

      - name: Refresh Docker and Cache
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/EJSC

            # Pastikan jembatan storage ada
            docker compose exec -T app php artisan storage:link || true

            # Bersihkan cache
            docker compose exec -T app php artisan optimize:clear

            # Beri izin akses folder
            sudo chmod -R 775 storage bootstrap/cache public
            sudo chown -R 1003:1003 storage bootstrap/cache public

            # Restart hanya app & nginx, db tidak disentuh
            docker compose up -d --no-deps app nginx

            echo "Deployment Success, May the force be with you!"